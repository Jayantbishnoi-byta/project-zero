
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Zero History</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="card">

<h1>📜 Project Zero History</h1>

<h2>Founder Summary</h2>

<div id="history"></div>

<br>

<a href="index.html">
<button>⬅ Back to Dashboard</button>
</a>

</div>

<script>

const saved=localStorage.getItem("projectZeroToday");

if(saved){

const data=JSON.parse(saved);

document.getElementById("history").innerHTML=`
<h3>📅 ${data.date}</h3>

<p><b>Attendance:</b> ${data.attendance}</p>

<p><b>Research:</b> ${data.research} Minutes</p>

<p><b>Today's Win:</b> ${data.win}</p>
`;

}else{

document.getElementById("history").innerHTML="<h3>No history found.</h3>";

}

</script>

</body>
</html>
