<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Project Zero History</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="card">

<h2>📈 Weekly Progress</h2>

<progress id="progressBar" value="0" max="100" style="width:100%;height:25px;"></progress>

<p id="progressText">0%</p>

<hr>

<h2>Founder Summary</h2>

<p>🔥 Current Streak: <span id="streakCount">0</span> Days</p>

<p>✅ Total Present: <span id="presentCount">0</span></p>

<p>❌ Total Absent: <span id="absentCount">0</span></p>

<p>⏱️ Total Research: <span id="researchTotal">0</span> Minutes</p>

<hr>

<h2>🏆 Achievements</h2>
<h3>⭐ Founder Level</h3>

<p id="founderLevel">🟢 Beginner</p>

<hr>
<div id="badges"></div>

<hr>

<h1>📜 Project Zero History</h1>

<div id="history"></div>

<br>

<a href="index.html">
<button>⬅ Back to Dashboard</button>
</a>

</div>

<script>
let history = JSON.parse(localStorage.getItem("projectZeroHistory")) || [];

let present = 0;
let absent = 0;
let research = 0;

history.forEach(day => {

    if(day.attendance.includes("Present")){
        present++;
    }else{
        absent++;
    }

    research += Number(day.research || 0);

});

document.getElementById("presentCount").innerHTML = present;
document.getElementById("absentCount").innerHTML = absent;
document.getElementById("researchTotal").innerHTML = research;

// Progress Bar

let total = present + absent;
let percent = total > 0 ? Math.round((present / total) * 100) : 0;

document.getElementById("progressBar").value = percent;
document.getElementById("progressText").innerHTML = percent + "%";

// Current Streak

let streak = 0;

for(let i = history.length - 1; i >= 0; i--){

    if(history[i].attendance.includes("Present")){
        streak++;
    }else{
        break;
    }

}

document.getElementById("streakCount").innerHTML = streak;

// History

let output = "";

if(history.length === 0){

    output = "<h3>No History Found</h3>";

}else{

    [...history].reverse().forEach(day=>{

        output += `
        <hr>

        <h3>📅 ${day.date}</h3>

        <p><b>Attendance:</b> ${day.attendance}</p>

        <p><b>Research:</b> ${day.research} Minutes</p>

        <p><b>Today's Win:</b> ${day.win}</p>

        <p><b>🎯 Goal:</b> ${day.goal || "-"}</p>

        <p><b>📊 Goal Progress:</b> ${day.goalProgress || 0}%</p>
        `;

    });

}

document.getElementById("history").innerHTML = output;

// Achievements

let badges = "";

if(history.length >= 1){
    badges += "🥉 First Save<br>";
}

if(research >= 100){
    badges += "📚 100 Research Minutes<br>";
}

if(streak >= 7){
    badges += "🔥 7 Day Streak<br>";
}

document.getElementById("badges").innerHTML = badges;
// Founder Level

let level = "🟢 Beginner";

if (research >= 100) {
    level = "🔵 Builder";
}

if (research >= 300) {
    level = "🟣 Founder";
}

if (research >= 1000) {
    level = "🟡 Legend";
}

document.getElementById("founderLevel").innerHTML = level;    
  </script>

</body>

</html>
