
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bro & Jayant - Project Zero</title>

<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
padding:20px;
}

.card{
max-width:700px;
margin:auto;
background:#1e293b;
padding:20px;
border-radius:15px;
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:8px;
margin-bottom:15px;
border-radius:8px;
border:none;
}

button{
background:#22c55e;
color:black;
padding:12px;
border:none;
border-radius:10px;
font-weight:bold;
width:100%;
}

#status{
margin-top:20px;
font-weight:bold;
}
</style>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card">

<h1>🚀 Bro 🤝 Jayant</h1>

<h2>Project Zero</h2>

<label>Date</label>

<input type="date" id="date">

<label>Attendance</label>

<select id="attendance">

<option>Present ✅</option>

<option>Absent ❌</option>

</select>

<label>Research Minutes</label>

<input type="number" id="research">

<label>Today's Win</label>

<textarea id="win"></textarea>
<hr>

<h2>🎯 Today's Goal</h2>

<label>Goal</label>

<input
type="text"
id="goal"
placeholder="Example: Learn JavaScript for 30 minutes">

<label>Goal Completed (%)</label>

<input
type="range"
id="goalProgress"
min="0"
max="100"
value="0"
oninput="document.getElementById('goalValue').innerHTML=this.value+'%'">

<p id="goalValue">0%</p>
<br><br>

<label>📝 Founder Note</label>

<textarea
id="note"
placeholder="Write today's learning..."
rows="4"
style="width:100%;">
</textarea>  
<button onclick="saveData()">

Save Today

</button>

<p id="status"></p>

</div>


<script src="script.js"></script>
</body>

  </html>
